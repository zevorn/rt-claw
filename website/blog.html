<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT-Claw Blog</title>
    <meta name="description" content="RT-Claw technical blog — tutorials, guides, and project updates.">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f172a;
            --bg-alt: #1e293b;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent2: #06b6d4;
            --accent3: #10b981;
            --border: #334155;
            --radius: 12px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
        }

        a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        a:hover { color: var(--accent-light); }

        /* Nav */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px;
        }
        .nav-logo {
            font-size: 1.2rem; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-logo img { height: 28px; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .nav-links a {
            color: var(--text-muted); font-size: 0.88rem; font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-github {
            color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem;
            transition: color 0.2s;
        }
        .nav-github:hover { color: var(--text); }
        .nav-toggle {
            display: none; background: none; border: none;
            color: var(--text); font-size: 1.5rem; cursor: pointer;
        }

        /* Blog layout */
        .blog-layout {
            display: flex; min-height: 100vh; padding-top: 64px;
        }

        /* Sidebar */
        .blog-sidebar {
            width: 280px; min-width: 280px;
            background: var(--bg-alt); border-right: 1px solid var(--border);
            padding: 1.5rem 0; overflow-y: auto; position: sticky; top: 64px;
            height: calc(100vh - 64px);
        }
        .blog-sidebar h3 {
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-muted);
            padding: 0.5rem 1.5rem; margin-top: 0.5rem;
        }
        .blog-sidebar a {
            display: block; padding: 0.6rem 1.5rem; font-size: 0.88rem;
            color: var(--text-muted); border-left: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .blog-sidebar a:hover {
            color: var(--text); background: rgba(245, 158, 11, 0.05);
        }
        .blog-sidebar a.active {
            color: var(--accent); border-left-color: var(--accent);
            background: rgba(245, 158, 11, 0.08);
        }
        .blog-sidebar .post-date {
            font-size: 0.72rem; color: var(--text-muted); opacity: 0.7;
            display: block; margin-top: 0.15rem;
        }

        /* Content */
        .blog-content {
            flex: 1; max-width: 860px; padding: 2.5rem 3rem; min-width: 0;
        }

        /* Markdown rendering */
        .blog-content h1 {
            font-size: 2rem; font-weight: 800; margin-bottom: 1rem;
            padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
        }
        .blog-content h2 {
            font-size: 1.4rem; font-weight: 700; margin: 2rem 0 0.75rem;
            padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
        }
        .blog-content h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
        .blog-content h4 { font-size: 0.95rem; font-weight: 600; margin: 1.2rem 0 0.4rem; }
        .blog-content p { margin: 0.75rem 0; }
        .blog-content ul, .blog-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
        .blog-content li { margin: 0.3rem 0; }
        .blog-content blockquote {
            border-left: 3px solid var(--accent); margin: 1rem 0;
            padding: 0.5rem 1rem; background: rgba(245, 158, 11, 0.06);
            border-radius: 0 8px 8px 0; color: var(--text-muted);
        }
        .blog-content table {
            width: 100%; border-collapse: collapse; margin: 1rem 0;
            font-size: 0.88rem;
        }
        .blog-content th, .blog-content td {
            padding: 0.6rem 0.8rem; border: 1px solid var(--border);
            text-align: left;
        }
        .blog-content th { background: var(--bg-alt); font-weight: 600; }
        .blog-content code {
            font-family: var(--mono); font-size: 0.85em;
            background: rgba(148, 163, 184, 0.12); padding: 0.15rem 0.4rem;
            border-radius: 4px;
        }
        .blog-content pre {
            background: #0c0c0c; border: 1px solid var(--border);
            border-radius: 8px; padding: 1rem 1.2rem; margin: 1rem 0;
            overflow-x: auto; line-height: 1.5;
        }
        .blog-content pre code {
            background: none; padding: 0; font-size: 0.82rem;
            color: #d4d4d4;
        }
        .blog-content img {
            max-width: 100%; border-radius: 8px; margin: 1rem 0;
            display: block;
        }
        .blog-content hr {
            border: none; border-top: 1px solid var(--border); margin: 2rem 0;
        }
        .blog-content strong { color: var(--text); }

        .blog-loading {
            color: var(--text-muted); font-style: italic; padding: 3rem 0;
        }

        /* Mobile */
        .sidebar-toggle {
            display: none; position: fixed; bottom: 1.5rem; right: 1.5rem;
            z-index: 200; width: 48px; height: 48px;
            background: var(--accent); color: #fff; border: none;
            border-radius: 50%; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav-toggle { display: block; }
            .blog-sidebar {
                position: fixed; left: -300px; top: 64px; z-index: 150;
                width: 300px; min-width: 300px;
                transition: left 0.3s; box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            }
            .blog-sidebar.open { left: 0; }
            .sidebar-toggle { display: block; }
            .blog-content { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">
            <img src="img/logo.png" alt="RT-Claw">
            RT-Claw
        </a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="docs.html">Docs</a></li>
            <li><a href="https://github.com/zevorn/rt-claw" class="nav-github" target="_blank">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
                GitHub
            </a></li>
        </ul>
    </div>
</nav>

<div class="blog-layout">
    <!-- Sidebar -->
    <aside class="blog-sidebar" id="blog-sidebar">
        <h3>Blog</h3>
        <a href="?post=rtthread-qemu-guide" data-post="rtthread-qemu-guide" class="active">
            在 RT-Thread 上运行 AI 助理
            <span class="post-date">2026-03-15</span>
        </a>
    </aside>

    <!-- Content -->
    <main class="blog-content" id="blog-content">
        <p class="blog-loading">Loading...</p>
    </main>
</div>

<!-- Mobile sidebar toggle -->
<button class="sidebar-toggle" onclick="document.getElementById('blog-sidebar').classList.toggle('open')">&#9776;</button>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
var currentPost = 'rtthread-qemu-guide';

function getPostParam() {
    var params = new URLSearchParams(window.location.search);
    return params.get('post') || 'rtthread-qemu-guide';
}

function loadPost(name) {
    currentPost = name;
    var content = document.getElementById('blog-content');
    content.innerHTML = '<p class="blog-loading">Loading...</p>';

    fetch('docs/zh/blog/' + name + '.md')
        .then(function(r) {
            if (!r.ok) throw new Error(r.status);
            return r.text();
        })
        .then(function(md) {
            content.innerHTML = marked.parse(md);
            /* Fix image paths: ../../images/ -> img/ */
            content.querySelectorAll('img[src]').forEach(function(img) {
                var src = img.getAttribute('src');
                if (src.indexOf('../../images/') === 0) {
                    img.src = 'img/' + src.replace('../../images/', '');
                }
            });
            window.scrollTo(0, 0);
        })
        .catch(function() {
            content.innerHTML = '<p class="blog-loading">Post not found.</p>';
        });

    document.querySelectorAll('.blog-sidebar a[data-post]').forEach(function(a) {
        a.classList.toggle('active', a.getAttribute('data-post') === name);
    });

    history.replaceState(null, '', '?post=' + name);
}

/* Sidebar link click */
document.querySelectorAll('.blog-sidebar a[data-post]').forEach(function(a) {
    a.addEventListener('click', function(e) {
        e.preventDefault();
        loadPost(this.getAttribute('data-post'));
        document.getElementById('blog-sidebar').classList.remove('open');
    });
});

/* Init */
loadPost(getPostParam());
</script>
</body>
</html>
