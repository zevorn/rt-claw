name: CI Online Integration

on:
  push:
    branches: [main]
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'platform/esp32c3-qemu/**'
      - 'platform/esp32s3-qemu/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci-online-integration.yml'
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-online-${{ github.ref }}
  cancel-in-progress: true

jobs:
  online:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32c3-qemu
            esp_targets: esp32c3
            qemu_tools: qemu-riscv32
          - target: esp32s3-qemu
            esp_targets: esp32s3
            qemu_tools: qemu-xtensa

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect integration secrets
        id: secrets
        env:
          RTCLAW_AI_API_KEY: ${{ secrets.RTCLAW_AI_API_KEY }}
          RTCLAW_FEISHU_APP_ID: ${{ secrets.RTCLAW_FEISHU_APP_ID }}
          RTCLAW_FEISHU_APP_SECRET: ${{ secrets.RTCLAW_FEISHU_APP_SECRET }}
        run: |
          missing=0
          for key in RTCLAW_AI_API_KEY RTCLAW_FEISHU_APP_ID RTCLAW_FEISHU_APP_SECRET; do
            if [ -z "${!key:-}" ]; then
              echo "::notice::Missing integration secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        run: scripts/ci/install-system-deps.sh qemu

      - name: Cache ESP-IDF source
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-idf
          key: esp-idf-src-v5.4-${{ runner.os }}

      - name: Cache ESP-IDF tools
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-tools-v5.4-${{ runner.os }}

      - name: Ensure ESP-IDF environment
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        run: scripts/ci/setup-esp-idf.sh "${{ matrix.esp_targets }}" "${{ matrix.qemu_tools }}"

      - name: Run online integration smoke
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        env:
          RTCLAW_AI_API_KEY: ${{ secrets.RTCLAW_AI_API_KEY }}
          RTCLAW_AI_API_URL: ${{ secrets.RTCLAW_AI_API_URL }}
          RTCLAW_AI_MODEL: ${{ secrets.RTCLAW_AI_MODEL }}
          RTCLAW_FEISHU_APP_ID: ${{ secrets.RTCLAW_FEISHU_APP_ID }}
          RTCLAW_FEISHU_APP_SECRET: ${{ secrets.RTCLAW_FEISHU_APP_SECRET }}
        run: |
          : "${RTCLAW_AI_API_URL:=https://api.anthropic.com/v1/messages}"
          : "${RTCLAW_AI_MODEL:=claude-sonnet-4-5}"
          export RTCLAW_AI_API_URL RTCLAW_AI_MODEL
          tests/qemu/run-online.sh "${{ matrix.target }}"

      - name: Upload integration logs
        if: ${{ always() && steps.secrets.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-online
          path: ci-artifacts/
