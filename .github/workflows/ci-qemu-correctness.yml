name: CI QEMU Correctness

on:
  push:
    branches: [main]
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'drivers/**'
      - 'platform/esp32c3/**'
      - 'platform/esp32s3/**'
      - 'platform/common/**'
      - 'platform/vexpress-a9/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci-qemu-correctness.yml'
  pull_request:
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'drivers/**'
      - 'platform/esp32c3/**'
      - 'platform/esp32s3/**'
      - 'platform/common/**'
      - 'platform/vexpress-a9/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci-qemu-correctness.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-qemu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32c3-qemu
            esp_targets: esp32c3
            qemu_tools: qemu-riscv32
          - target: esp32s3-qemu
            esp_targets: esp32s3
            qemu_tools: qemu-xtensa
          - target: vexpress-a9-qemu
            esp_targets: ""
            qemu_tools: none

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: scripts/ci/install-system-deps.sh qemu

      - name: Cache ESP-IDF source
        if: ${{ matrix.esp_targets != '' }}
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-idf
          key: esp-idf-src-v5.4-${{ runner.os }}

      - name: Cache ESP-IDF tools
        if: ${{ matrix.esp_targets != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-tools-v5.4-${{ runner.os }}

      - name: Ensure ESP-IDF environment
        if: ${{ matrix.esp_targets != '' }}
        run: scripts/ci/setup-esp-idf.sh "${{ matrix.esp_targets }}" "${{ matrix.qemu_tools }}"

      - name: Run QEMU smoke test
        run: tests/qemu/run-smoke.sh "${{ matrix.target }}"

      - name: Upload QEMU logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-smoke
          path: ci-artifacts/
