name: CI QEMU Correctness

on:
  push:
    branches: [main]
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'drivers/**'
      - 'platform/esp32c3/**'
      - 'platform/common/**'
      - 'platform/vexpress-a9/**'
      - 'platform/zynq-a9/**'
      - 'vendor/bsp/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci-qemu-correctness.yml'
  pull_request:
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'drivers/**'
      - 'platform/esp32c3/**'
      - 'platform/common/**'
      - 'platform/vexpress-a9/**'
      - 'platform/zynq-a9/**'
      - 'vendor/bsp/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci-qemu-correctness.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-qemu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32c3-qemu
            esp_targets: esp32c3
            qemu_tools: qemu-riscv32
            make_target: test-smoke-esp32c3
            timeout: 25
          - target: vexpress-a9-qemu
            esp_targets: ""
            qemu_tools: none
            make_target: test-smoke-vexpress
            timeout: 15
          - target: zynq-a9-qemu
            esp_targets: ""
            qemu_tools: none
            make_target: test-smoke-zynq
            timeout: 15
          - target: zynq-a9-unit
            esp_targets: ""
            qemu_tools: none
            make_target: test-unit-zynq
            timeout: 20

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: scripts/ci/install-system-deps.sh qemu

      - name: Cache ESP-IDF source
        if: ${{ matrix.esp_targets != '' }}
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-idf
          key: esp-idf-src-v5.4-${{ runner.os }}

      - name: Cache ESP-IDF tools
        if: ${{ matrix.esp_targets != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-tools-v5.4-${{ runner.os }}

      - name: Ensure ESP-IDF environment
        if: ${{ matrix.esp_targets != '' }}
        run: scripts/ci/setup-esp-idf.sh "${{ matrix.esp_targets }}" "${{ matrix.qemu_tools }}"

      - name: Run QEMU smoke test
        run: |
          if [ -n "${{ matrix.esp_targets }}" ]; then
            source ~/esp/esp-idf/export.sh
          fi
          make ${{ matrix.make_target }}
