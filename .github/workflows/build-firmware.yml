name: Build Hardware Firmware

on:
  push:
    branches: [main]
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'drivers/**'
      - 'platform/esp32c3/**'
      - 'platform/esp32s3/**'
      - 'platform/common/**'
      - 'scripts/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: firmware
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32c3
            make_target: build-esp32c3-devkit
            build_dir: build/esp32c3-devkit/idf
            esp_targets: esp32c3
            chip_family: ESP32-C3
            artifact_name: esp32c3-firmware
          - target: esp32s3
            make_target: esp32s3
            build_dir: build/esp32s3-default/idf
            esp_targets: esp32s3
            chip_family: ESP32-S3
            artifact_name: esp32s3-firmware
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: scripts/ci/install-system-deps.sh build

      - name: Cache ESP-IDF source
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-idf
          key: esp-idf-src-v5.4-${{ runner.os }}

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-tools-v5.4-${{ matrix.esp_targets }}-${{ runner.os }}

      - name: Ensure ESP-IDF environment
        run: scripts/ci/setup-esp-idf.sh "${{ matrix.esp_targets }}" none

      - name: Build hardware firmware
        run: |
          source ~/esp/esp-idf/export.sh
          make ${{ matrix.make_target }}

      - name: Prepare firmware artifacts
        run: |
          RTCLAW_FIRMWARE_VERSION="${{ github.sha }}" \
            scripts/ci/package-esp-firmware.sh \
            "${{ matrix.build_dir }}" "${{ matrix.chip_family }}" firmware-out "RT-Claw"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: firmware-out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download ESP32-C3 firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: esp32c3-firmware
          path: website/firmware/esp32c3/

      - name: Download ESP32-S3 firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-firmware
          path: website/firmware/esp32s3/

      - name: Copy images to website
        run: cp -r images/ website/img/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - id: deployment
        uses: actions/deploy-pages@v4
